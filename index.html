<!doctype html>
<html lang="ko"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="4STEPS BOOK CLUB - 국제학교·유학생을 위한 프리미엄 주니어 북클럽">
  <title>4STEPS BOOK CLUB | Junior Reading &amp; Writing</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="images/favicon-48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-180.png">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Noto+Sans+KR:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#102a43;
      --deep:#081c2c;
      --blue:#1e4e72;
      --orange:#cf7a38;
      --green:#4a7c59;
      --teal:#4f92a2;
      --gold:#d9a05b;
      --ink:#243b53;
      --muted:#627d98;
      --line:#e7edf2;
      --soft:#f7f9fb;
      --cream:#fbfaf7;
      --white:#fff;
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      width:100%;
      min-height:100%;
      font-family:Inter, "Noto Sans KR", sans-serif;
      color:var(--ink);
      line-height:1.7;
      overflow-x:hidden;
    }
    body.modal-open { overflow:hidden; }
    a { color:inherit; text-decoration:none; }
    button, input, textarea, select { font:inherit; }
    button, a, input, textarea, select { outline-offset:3px; }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline:3px solid rgba(207,122,56,.55);
    }
    .site-shell { width:100%; }
    .main-content { width:min(1180px, calc(100% - 44px)); margin-inline:auto; }

    .site-header {
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
    }
    .navbar {
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:22px;
    }
    .brand {
      display:flex;
      align-items:center;
      min-width:190px;
    }
    .brand-logo {
      display:block;
      width:184px;
      height:62px;
      object-fit:contain;
      object-position:left center;
      opacity:1;
      visibility:visible;
    }
    .desktop-nav {
      display:flex;
      align-items:center;
      gap:20px;
    }
    .desktop-nav > a:not(.nav-social):not(.nav-cta) {
      color:#526579;
      font-size:12px;
      font-weight:750;
      letter-spacing:.03em;
      white-space:nowrap;
      transition:.2s;
    }
    .desktop-nav > a:not(.nav-social):not(.nav-cta):hover { color:var(--navy); }
    .nav-social {
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:9px;
      transition:.2s;
    }
    .nav-social:hover { transform:translateY(-2px); }
    .naver { background:#03c75a; color:#fff; }
    .kakao { background:#fee500; color:#3a1d1d; }
    .nav-cta {
      padding:10px 15px;
      border-radius:7px;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }
    .menu-button {
      display:none;
      border:0;
      background:transparent;
      color:var(--navy);
      cursor:pointer;
      padding:8px;
    }

    .hero {
      position:relative;
      overflow:hidden;
      min-height:650px;
      display:flex;
      align-items:center;
      color:#fff;
    }
    .hero::before {
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 82% 16%, rgba(207,122,56,.3), transparent 28%),
        linear-gradient(90deg, rgba(5,20,32,.72), transparent 75%);
      pointer-events:none;
    }
    .hero::after {
      content:"";
      position:absolute;
      right:-100px;
      bottom:-180px;
      width:520px;
      height:520px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:50%;
      box-shadow:0 0 0 58px rgba(255,255,255,.025), 0 0 0 116px rgba(255,255,255,.018);
    }
    .hero-bars {
      position:absolute;
      right:6%;
      top:50%;
      transform:translateY(-50%);
      width:220px;
      height:220px;
      opacity:.15;
    }
    .hero-inner {
      position:relative;
      z-index:2;
      max-width:920px;
      padding:96px 0;
    }
    .kicker {
      display:inline-flex;
      padding:7px 15px;
      border:1px solid rgba(255,255,255,.25);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      letter-spacing:.12em;
      margin-bottom:23px;
    }
    .hero-title {
      line-height:1.12;
      letter-spacing:-.045em;
      margin-bottom:24px;
      white-space:pre-line;
    }
    .hero-desc {
      max-width:790px;
      color:#d0dce6;
      margin-bottom:34px;
    }
    .hero-actions { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .action-button {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:52px;
      border-radius:7px;
      padding:13px 24px;
      font-weight:800;
      transition:.2s;
    }
    .action-button:hover { transform:translateY(-2px); }
    .primary-button { box-shadow:0 8px 24px rgba(207,122,56,.3); }
    .outline-button {
      border:1px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.04);
    }
    .social-outline { border:1px solid rgba(255,255,255,.2); }
    .hero-stats {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:48px;
    }
    .hero-stat {
      min-width:150px;
      padding:14px 18px;
      border-left:2px solid var(--orange);
      background:rgba(255,255,255,.07);
    }
    .hero-stat b { display:block; }
    .hero-stat small { display:block; color:#b9c9d8; }

    .page-section { padding:105px 0; scroll-margin-top:78px; }
    .section-heading {
      max-width:820px;
      margin:0 auto 58px;
      text-align:center;
    }
    .eyebrow {
      letter-spacing:.18em;
      margin-bottom:10px;
    }
    .section-title {
      line-height:1.24;
      letter-spacing:-.035em;
      margin-bottom:16px;
      white-space:pre-line;
    }
    .section-description { color:var(--muted); }

    .story-layout, .faculty-layout {
      display:grid;
      grid-template-columns:1.08fr .92fr;
      align-items:center;
      gap:64px;
    }
    .story-copy h3, .faculty-copy h2 {
      line-height:1.35;
      margin-bottom:20px;
      white-space:pre-line;
    }
    .story-copy p, .faculty-copy > p {
      color:var(--muted);
      margin-bottom:17px;
    }
    .quote {
      padding:27px 30px;
      border-left:4px solid var(--orange);
      border-radius:0 10px 10px 0;
      font-weight:750;
    }
    .problem-panel {
      padding:40px;
      border-radius:18px;
      color:#fff;
      box-shadow:0 20px 55px rgba(16,42,67,.18);
    }
    .problem-panel h3 { line-height:1.35; margin-bottom:22px; white-space:pre-line; }
    .problem-list { list-style:none; }
    .problem-list li {
      position:relative;
      padding:14px 0 14px 30px;
      border-bottom:1px solid rgba(255,255,255,.12);
      color:#cfdae3;
    }
    .problem-list li::before {
      content:"×";
      position:absolute;
      left:0;
      color:#f0a263;
      font-size:22px;
      font-weight:900;
    }
    .problem-list li:last-child { border-bottom:0; }

    .comparison {
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:0 18px 50px rgba(16,42,67,.07);
    }
    .comparison-grid {
      display:grid;
      grid-template-columns:1fr 1.45fr 1.45fr;
    }
    .comparison-grid > div {
      padding:22px 24px;
      border-bottom:1px solid var(--line);
    }
    .comparison-head { text-align:center; font-weight:850; }
    .comparison-label { background:#f0f4f8; text-align:center; font-weight:850; }
    .premium-cell { background:#fffaf6; }
    .premium-cell strong { color:var(--orange); }
    .normal-cell { color:var(--muted); }
    .comparison-grid > div:nth-last-child(-n+3) { border-bottom:0; }

    .faculty-card {
      padding:42px;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 18px 50px rgba(16,42,67,.08);
    }
    .faculty-badge {
      display:inline-block;
      padding:6px 13px;
      margin-bottom:15px;
      border-radius:999px;
    }
    .faculty-card h3 { line-height:1.3; margin-bottom:5px; white-space:pre-line; }
    .faculty-card .faculty-sub { color:var(--orange); font-weight:850; margin-bottom:25px; }
    .faculty-card > p { color:var(--muted); }
    .checks { list-style:none; margin-top:22px; }
    .checks li { position:relative; padding-left:28px; margin:13px 0; color:#486581; }
    .checks li::before { content:"✓"; position:absolute; left:0; color:var(--orange); font-weight:950; }
    .faculty-stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:25px; }
    .faculty-stat { padding:15px; text-align:center; border-radius:9px; }
    .faculty-stat b, .faculty-stat span { display:block; }
    .faculty-stat span { color:var(--muted); }

    .curriculum-grid {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:18px;
    }
    .curriculum-card {
      min-height:310px;
      padding:31px 24px;
      border:1px solid var(--line);
      border-radius:14px;
      transition:transform .25s, box-shadow .25s;
    }
    .curriculum-card:hover {
      transform:translateY(-6px);
      box-shadow:0 18px 45px rgba(16,42,67,.09);
    }
    .curriculum-card:nth-child(1) { border-top:4px solid var(--navy); }
    .curriculum-card:nth-child(2) { border-top:4px solid var(--orange); }
    .curriculum-card:nth-child(3) { border-top:4px solid var(--green); }
    .curriculum-card:nth-child(4) { border-top:4px solid var(--gold); }
    .step-number { color:#9fb3c8; letter-spacing:.12em; margin-bottom:10px; }
    .curriculum-card h3 { margin-bottom:3px; }
    .step-ko { display:block; color:var(--muted); margin-bottom:19px; }
    .curriculum-card p { color:#486581; }

    .learning-flow {
      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:0;
      margin-top:58px;
    }
    .flow-item {
      position:relative;
      padding:0 10px;
      text-align:center;
    }
    .flow-item:not(:last-child)::after {
      content:"→";
      position:absolute;
      right:-7px;
      top:13px;
      color:#b6c4d0;
      font-size:22px;
    }
    .flow-icon {
      width:52px;
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 13px;
      border-radius:50%;
      color:#fff;
      background:var(--navy);
      font-weight:900;
    }
    .flow-item:nth-child(5) .flow-icon { background:var(--orange); }
    .flow-item:nth-child(6) .flow-icon { background:var(--green); }
    .flow-item h3 { margin-bottom:5px; }
    .flow-item p { color:var(--muted); }

    .content-showcase {
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:24px;
      align-items:stretch;
    }
    .sample-card {
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 18px 50px rgba(16,42,67,.08);
    }
    .sample-card.featured { grid-row:span 2; }
    .sample-media {
      position:relative;
      overflow:hidden;
      background:#edf2f6;
      border-bottom:1px solid var(--line);
    }
    .sample-card.featured .sample-media { min-height:360px; }
    .sample-card:not(.featured) .sample-media { min-height:220px; }
    .sample-image {
      display:block;
      width:100%;
      height:100%;
      min-height:inherit;
      object-fit:cover;
      opacity:1;
      visibility:visible;
      transition:transform .45s ease;
    }
    .sample-card:hover .sample-image { transform:scale(1.018); }
    .sample-card.workbook .sample-image { object-fit:contain; background:#fff; padding:12px; }
    .sample-card.overview .sample-image { object-fit:contain; background:#fff; padding:8px; }
    .expand-button {
      position:absolute;
      right:14px;
      bottom:14px;
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:9px 13px;
      border:1px solid rgba(255,255,255,.7);
      border-radius:8px;
      background:rgba(8,28,44,.86);
      color:#fff;
      cursor:pointer;
      box-shadow:0 8px 24px rgba(8,28,44,.2);
      transition:.2s;
    }
    .expand-button:hover { transform:translateY(-2px); background:var(--navy); }
    .sample-copy { padding:25px 26px 27px; }
    .sample-index {
      display:inline-block;
      margin-bottom:7px;
      color:var(--orange);
      font-weight:900;
      letter-spacing:.14em;
    }
    .sample-copy h3 { margin-bottom:9px; color:var(--navy); }
    .sample-copy p { color:var(--muted); }

    .lesson-panel {
      margin-top:30px;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 18px 50px rgba(16,42,67,.07);
    }
    .lesson-panel-head {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:24px;
      padding:30px 32px;
      color:#fff;
    }
    .lesson-panel-head h3 { margin-top:5px; }
    .lesson-panel-head p:last-child { max-width:480px; color:#cfdae3; }
    .weekly-steps {
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      padding:0 20px 28px;
    }
    .weekly-step {
      position:relative;
      padding:30px 18px 5px;
      text-align:center;
    }
    .weekly-step:not(:last-child)::after {
      content:"";
      position:absolute;
      top:51px;
      left:calc(50% + 30px);
      width:calc(100% - 60px);
      height:1px;
      background:#d9e1e8;
    }
    .weekly-number {
      position:relative;
      z-index:2;
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 15px;
      border-radius:50%;
      background:#eef3f7;
      color:var(--navy);
      font-weight:900;
    }
    .weekly-step:nth-child(2) .weekly-number { background:#fff0e4; color:var(--orange); }
    .weekly-step:nth-child(3) .weekly-number { background:#eaf4e8; color:var(--green); }
    .weekly-step:nth-child(4) .weekly-number { background:#e9f4f6; color:var(--teal); }
    .weekly-step:nth-child(5) .weekly-number { background:#fff4e5; color:#a76b23; }
    .weekly-step h4 { margin-bottom:6px; color:var(--navy); }
    .weekly-step p { color:var(--muted); }

    .outcome-grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
      margin-top:24px;
    }
    .outcome-card {
      padding:27px;
      border:1px solid var(--line);
      border-radius:14px;
    }
    .outcome-icon {
      width:43px;
      height:43px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
      border-radius:11px;
      color:var(--orange);
      background:#fff4eb;
    }
    .outcome-card h3 { margin-bottom:8px; color:var(--navy); }
    .outcome-card p { color:var(--muted); }

    .feature-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; }
    .feature-card {
      padding:32px 28px;
      border:1px solid var(--line);
      border-radius:14px;
    }
    .feature-icon {
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:15px;
      border-radius:12px;
      color:var(--orange);
      background:#fff4eb;
    }
    .feature-card h3 { margin-bottom:10px; }
    .feature-card p { color:var(--muted); }

    .consult-panel {
      max-width:700px;
      margin:auto;
      padding:43px;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 18px 50px rgba(16,42,67,.08);
    }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .form-group { display:flex; flex-direction:column; gap:7px; }
    .form-group.full { grid-column:1/-1; }
    .form-group label { font-weight:750; }
    .form-group input, .form-group textarea, .form-group select {
      width:100%;
      padding:13px 14px;
      border:1px solid #cbd5e1;
      border-radius:7px;
      background:#f8fafc;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color:var(--navy);
      background:#fff;
    }
    .form-group textarea { min-height:105px; resize:vertical; }
    .submit-button {
      width:100%;
      min-height:52px;
      margin-top:18px;
      border:0;
      border-radius:7px;
      cursor:pointer;
      font-weight:850;
      transition:.2s;
    }
    .submit-button:hover { transform:translateY(-2px); }
    .submit-button:disabled { opacity:.65; cursor:wait; transform:none; }
    .form-note { text-align:center; margin-top:12px; }

    .site-footer { padding:55px 0 28px; }
    .footer-top { display:flex; justify-content:space-between; align-items:flex-start; gap:30px; }
    .footer-brand b { display:block; margin-bottom:7px; }
    .footer-brand p { color:#b9c9d8; }
    .footer-right { display:flex; flex-direction:column; align-items:flex-end; gap:18px; }
    .footer-links, .footer-socials { display:flex; flex-wrap:wrap; gap:18px; }
    .footer-social {
      width:42px;
      height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
    }
    .copyright {
      margin-top:38px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,.1);
      color:#829ab1;
    }

    .floating-actions {
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:900;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }
    .floating-button {
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:11px 18px;
      border-radius:999px;
      box-shadow:0 8px 25px rgba(0,0,0,.15);
      font-weight:800;
      transition:.2s;
    }
    .floating-button:hover { transform:translateY(-2px); }

    .image-modal {
      position:fixed;
      inset:0;
      z-index:3000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(5,20,32,.82);
      backdrop-filter:blur(8px);
    }
    .image-modal.open { display:flex; }
    .modal-dialog {
      position:relative;
      width:min(1120px, 100%);
      max-height:calc(92 * min(var(--vh, 1vh), 1vh));
      padding:18px;
      border-radius:18px;
      background:#fff;
      box-shadow:0 30px 90px rgba(0,0,0,.35);
      overflow:auto;
    }
    .modal-image {
      display:block;
      width:100%;
      max-height:calc(76 * min(var(--vh, 1vh), 1vh));
      object-fit:contain;
      background:#f4f6f8;
      border-radius:10px;
    }
    .modal-close {
      position:absolute;
      top:27px;
      right:27px;
      z-index:2;
      width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:0;
      border-radius:50%;
      background:rgba(8,28,44,.9);
      color:#fff;
      cursor:pointer;
    }
    .modal-caption { padding:15px 4px 2px; color:var(--navy); font-weight:800; }

    .toast {
      position:fixed;
      left:50%;
      bottom:30px;
      z-index:4000;
      max-width:calc(100% - 32px);
      padding:15px 22px;
      border-radius:8px;
      opacity:0;
      pointer-events:none;
      transform:translate(-50%, 120px);
      transition:.3s;
      text-align:center;
    }
    .toast.show { opacity:1; transform:translate(-50%, 0); }

    @media (max-width:1100px) {
      .desktop-nav { gap:14px; }
      .nav-social { display:none; }
    }

    @media (max-width:1000px) {
      .desktop-nav {
        display:none;
        position:absolute;
        top:82px;
        left:0;
        right:0;
        padding:16px 22px;
        border-bottom:1px solid var(--line);
        background:#fff;
        box-shadow:0 10px 20px rgba(0,0,0,.06);
        flex-direction:column;
